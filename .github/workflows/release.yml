name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  changesets:
    name: Version or publish
    runs-on: ubuntu-latest
    outputs:
      published: ${{ steps.changesets.outputs.published }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Create release PR or publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          version: bun run version-packages
          publish: bun run release:npm
          title: "Version Packages"
          commit: "Version Packages"
          createGithubReleases: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Read published version
        id: version
        if: steps.changesets.outputs.published == 'true'
        run: echo "version=$(jq -r .version package.json)" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.artifact }}
    needs: changesets
    if: needs.changesets.outputs.published == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: bun-darwin-arm64
            artifact: surreal-migrator-darwin-arm64
          - target: bun-darwin-x64
            artifact: surreal-migrator-darwin-x64
          - target: bun-linux-x64
            artifact: surreal-migrator-linux-x64
          - target: bun-linux-arm64
            artifact: surreal-migrator-linux-arm64
          - target: bun-windows-x64
            artifact: surreal-migrator-windows-x64.exe
          - target: bun-windows-arm64
            artifact: surreal-migrator-windows-arm64.exe
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Compile SurQL-only binary
        run: |
          mkdir -p dist
          bun build \
            --compile \
            --define __SM_TS_MIGRATIONS__=false \
            --target=${{ matrix.target }} \
            ./src/index.ts \
            --outfile dist/${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}
          if-no-files-found: error
          retention-days: 7

  github-release:
    name: GitHub Release
    needs: [changesets, build]
    if: needs.changesets.outputs.published == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Download binaries
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: List binaries
        run: ls -lah dist/

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ needs.changesets.outputs.version }}
          name: v${{ needs.changesets.outputs.version }}
          generate_release_notes: true
          files: dist/surreal-migrator-*
